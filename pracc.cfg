// ==================================================
// README - AMMO + GRENADE & DEBUG
// ==================================================
//  Infinite ammo        : Enabled (reload required)
//  Max grenades         : 5
//  Trajectory preview   : Enabled
//  Trajectory trails    : Enabled
//  Bullet impacts       : Enabled
