echo --- SpiRaL' CS2 practice config started ---


// ==================================================
// [1] CHEATS
// ==================================================
sv_cheats "1"                     // Enable cheat commands | default: 0


// ==================================================
// [2] ECONOMY
// ==================================================
mp_maxmoney "60000"               // Max money | default: 16000
mp_startmoney "60000"             // Start money | default: 800
mp_buytime "9999"                 // Unlimited buy time | default: 20
mp_buy_anywhere "1"               // Buy anywhere on map | default: 0


// ==================================================
// [3] TEAMS
// ==================================================
mp_limitteams "0"                 // Disable team limit | default: 2
mp_autoteambalance "0"            // Disable auto balance | default: 1


// ==================================================
// [4] ROUND SETTINGS
// ==================================================
mp_freezetime "0"                 // No freeze time | default: 6
mp_roundtime "60"                 // Round duration (casual) | default: 1.92
mp_roundtime_defuse "60"          // Round duration (defuse) | default: 1.92


// ==================================================
// [5] RESPAWN
// ==================================================
mp_respawn_on_death_ct "1"        // Instant respawn CT | default: 0
mp_respawn_on_death_t "1"         // Instant respawn T | default: 0


// ==================================================
// [6] BOTS
// ==================================================
bot_kick                          // Remove all bots | default: bots enabled
bot_freeze "1"                    // Freeze all bots | default: false
bot_dont_shoot "1"                // Bots don't shoot | default: false
bot_stop "1"                      // Stop all bots from moving | default: false

// ==================================================
// [7] AMMO
// ==================================================
sv_infinite_ammo "1"              // Infinite ammo (reload required) | default: 0
ammo_grenade_limit_total "5"      // Max grenades carried | default: 4


// ==================================================
// [8] GRENADE VISUALS
// ==================================================
sv_grenade_trajectory_prac_trailtime "8"   // Duration of trajectory | default: 8
sv_grenade_trajectory_prac_pipreview "1" // Live preview | default: 0


// ==================================================
// [9] IMPACT VISUALIZATION
// ==================================================
sv_showimpacts "1"                // Show bullet impacts | default: 0
sv_showimpacts_time "10"          // Impact duration | default: 4


// ==================================================
// [10] MOVEMENT TRAINING
// ==================================================
sv_enablebunnyhopping "1"         // Allow bhop | default: 0
sv_autobunnyhopping "1"           // Auto bhop | default: 0
// sv_airaccelerate "1000"        // Air control | default: 12


// ==================================================
// [11] UTILITY
// ==================================================
mp_warmup_end                     // Skip warmup phase | default: warmup active
god                               // No damage (practice) | default: disabled


// ==================================================
// [12] PRACTICE BINDS
// ==================================================
bind scancode62 "noclip"         // Toggle noclip (practice) | AZERTY: F5 | scancode62 | default: unbound
bind scancode63 "sv_rethrow_last_grenade" // Rethrow last grenade | AZERTY: F6 | scancode63 | default: unbound
bind scancode64 "bot_add;bot_place"      // Place bot at crosshair | AZERTY: F7 | scancode64 | default: unbound


// ==================================================
// [13] APPLY SETTINGS
// ==================================================
mp_restartgame "1"                // Restart game to apply changes | default: n/a


echo [PRACTICE] Practice mode ready
